name: Daily AI Agent Run

# 設定觸發條件：Cronjob 排程
on:
  schedule:
    # 這裡使用的是 UTC 時間。如果要在香港時間 (HKT) 早上 8 點執行，UTC 時間就是 0 點 (8 - 8 = 0)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許你隨時在 GitHub 網頁上手動點擊執行

jobs:
  run-agent:
    runs-on: ubuntu-latest # 使用最新的 Linux 虛擬機

    steps:
    - name: Checkout code
      uses: actions/checkout@v3 # 把你 GitHub 上的代碼抓進虛擬機

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # 指定 Python 版本

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt # 安裝你列出的套件

    - name: Run AI Agent script
      env:
        # 這裡負責把 GitHub Secrets 的密鑰安全地傳遞給 Python 環境變數
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}} # 新增這行
        DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }} # 新增這行
      run: python main.py # 執行你的主程式

    - name: Backup TXT to GitHub Artifacts
      if: always() # 關鍵：這行確保即使 Python 報錯 (例如上傳 Google Drive 失敗)，這一步依然會強制執行！
      uses: actions/upload-artifact@v4
      with:
        name: AI_Daily_Summaries # 在 GitHub 頁面上顯示的壓縮檔名稱
        path: "*.txt"            # 把所有 txt 檔都抓起來備份
        retention-days: 7        # 設定這些檔案在 GitHub 上保留 7 天